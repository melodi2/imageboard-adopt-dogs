<!doctype html>
<html>
<head>
    <title>Imageboard</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/vue.js"></script>
</head>
<body>
    <h1>Imageboard</h1>
    <h2>Latest Images</h2>
    <div id="main">
        <form>
            <input v-model="title" type="text" name="title" placeholder="title">
            <input v-model="description" type="text" name="description" placeholder="description">
            <input v-model='username' type="text" name="username" placeholder="username">
            <input @change="handleChange" type="file" name="file" accept='image/*'>
            <button @click.prevent.default="handleClick">SUBMIT</button>
        </form>

        <div class="container" @click="unsetCurrentImage">
            <div class="cards" v-for="image in images">
            <h4>{{image.title}}</h4>
            <a :href="'#'+image.id"><img :src="image.url" alt="" width="200" height="200"></a>
            <p>{{image.description}}</p>
            <button @click.prevent.default="deleteImage(image.id)">Delete Image</button>
            </div>
        </div>


        <image-modal  v-if="currentId" :id="currentId" @close="unsetCurrentImage"></image-modal>

    </div>

    <script type="text/x-template" id="my-template">

            <div class="modal">
                <a href="javascript://" @click="close">X</a>
                <div id="modalCard" >
                    <h4>{{image.title}}</h4>
                    <img :src="image.url" alt="" width="400" height="400">
                    <p>{{image.description}}</p>
                    <p id="uploader">Uploaded by {{image.username}} at {{image.created_at}}</p>
                    <form name="comment">
                        <input v-model='commenter' type="text" name="commenter" placeholder="username">
                        <button @click.prevent.default="submitComment">SUBMIT</button>
                    </form>
                    <textarea v-model='comment' name="comment" form="comment" rows="4" cols="28" placeholder="comment here"></textarea>
                    <div  class="comment" v-for="comments in comments">
                        {{comments.username}}
                        {{comments.comment}}
                        {{comments.created_at}}
                    </div>
                </div>
            </div>

    </script>
    <script src="/js/components.js"></script>
    <script src="/js/axios.min.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
