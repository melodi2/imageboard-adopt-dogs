    </header>
    <div id="main">
        <form>
            <p><input v-model='username' type="text" name="username" placeholder="username"></p>
            <p><input v-model="title" type="text" name="title" placeholder="title">
            <input v-model="description" type="text" name="description" class="description" placeholder="description"></p>
            <!-- <input @change="handleChange" type="file" name="file" accept='image/*'> -->
            <p>
                <input @change="handleChange" type="file" name="file" id="file" class="inputfile" accept='image/*'/>
                <label class="labelforInput" for="file"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="17" viewBox="0 0 20 17"><path d="M10 0l-5.2 4.9h3.3v5.1h3.8v-5.1h3.3l-5.2-4.9zm9.3 11.5l-3.2-2.1h-2l3.4 2.6h-3.5c-.1 0-.2.1-.2.1l-.8 2.3h-6l-.8-2.2c-.1-.1-.1-.2-.2-.2h-3.6l3.4-2.6h-2l-3.2 2.1c-.4.3-.7 1-.6 1.5l.6 3.1c.1.5.7.9 1.2.9h16.3c.6 0 1.1-.4 1.3-.9l.6-3.1c.1-.5-.2-1.2-.7-1.5z"></path></svg>Choose a file</label>
            </p>
            <p><button @click.prevent.default="handleClick">Upload</button></p>
        </form>

        <header>
            <p>Latest Uploads</p>
        </header>

        <div class="container" @click="unsetCurrentImage">
            <div class="cards" v-for="image in images">
            <h4>{{image.title}}</h4>
            <p><a :href="'#'+image.id"><img :src="image.url" alt="" width="200" height="200"></a></p>
            <p>{{image.description}}</p>
            <button @click.prevent.default="deleteImage(image.id)">Delete</button>
            </div>
        </div>


        <image-modal  v-if="currentId" :id="currentId" @close="unsetCurrentImage"></image-modal>

    </div>
    <footer>
        <div>Icons made by <a href="https://www.flaticon.com/authors/freepik" title="Freepik">Freepik</a> from <a href="https://www.flaticon.com/" title="Flaticon">www.flaticon.com</a></div>
    </footer>
    <script type="text/x-template" id="my-template">

            <div class="modal">
                <div class="xclose"><a href="javascript://" @click="close">X</a></div>
                <div id="modalCard">
                    <h4>{{image.title}}</h4>
                    <p><img :src="image.url" alt="" width="400" height="400"></p>
                    <p>{{image.description}}</p>
                    <p id="uploader">Uploaded by {{image.username}} on {{image.created_at}}</p>

                    <form name="comment">
                        <p><input v-model='commenter' type="text" name="commenter" placeholder="username"></p>

                        <p><textarea v-model='comment' name="comment" form="comment" rows="4" cols="28" placeholder="comment here"></textarea></p>

                        <p><button @click.prevent.default="submitComment">SUBMIT</button></p>
                    </form>

                    <div  class="comment" v-for="comments in comments">
                        <p>{{comments.comment}}</p>
                        <p id="uploader">{{comments.username}} on {{comments.created_at}}</p>
                    </div>
                </div>
            </div>

    </script>
    <script src="/js/components.js"></script>
    <script src="/js/axios.min.js"></script>
    <script src="/js/script.js"></script>
</body>
